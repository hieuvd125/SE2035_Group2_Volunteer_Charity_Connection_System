<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Danh sach dang ky</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body class="bg-light">

<div th:replace="~{fragments/header :: header-part}"></div>
<div th:replace="~{fragments/sidebar :: sidebar-part}"></div>

<div style="margin-left: 240px; padding: 30px; min-height: 100vh;">
    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2 class="fw-bold mb-1">Danh sach dang ky tinh nguyen vien</h2>
                <p class="text-muted mb-0">So luot dang ky hien tai: <span th:text="${activeRegistrations}">0</span></p>
            </div>
            <a th:href="@{/projects/detail/{id}(id=${projectId})}" class="btn btn-outline-secondary rounded-pill">
                Quay lai du an
            </a>
        </div>

        <div class="card shadow-sm border-0">
            <div class="card-body">
                <div th:if="${registrations == null || registrations.isEmpty()}" class="text-center text-muted py-5">
                    Chua co luot dang ky nao.
                </div>

                <div class="table-responsive" th:if="${registrations != null && !registrations.isEmpty()}">
                    <table class="table align-middle">
                        <thead class="table-light">
                        <tr>
                            <th>Volunteer</th>
                            <th>Email</th>
                            <th>Trang thai</th>
                            <th>Ngay dang ky</th>
                            <th class="text-end">Xu ly</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="reg : ${registrations}">
                            <td>
                                <div class="fw-semibold" th:text="${reg.volunteer.fullName}">Full name</div>
                                <small class="text-muted" th:text="${reg.volunteer.username}">username</small>
                            </td>
                            <td th:text="${reg.volunteer.email}">email@example.com</td>
                            <td>
                                <span class="badge bg-secondary" th:text="${reg.status}">PENDING</span>
                            </td>
                            <td th:text="${reg.registrationDate}">2026-01-01</td>
                            <td class="text-end">
                                <form th:action="@{/registrations/{id}/status(id=${reg.id})}" method="post" class="d-inline">
                                    <input type="hidden" name="projectId" th:value="${projectId}" />
                                    <input type="hidden" name="status" value="APPROVED" />
                                    <button type="submit" class="btn btn-success btn-sm rounded-pill me-2">Approve</button>
                                </form>
                                <form th:action="@{/registrations/{id}/status(id=${reg.id})}" method="post" class="d-inline">
                                    <input type="hidden" name="projectId" th:value="${projectId}" />
                                    <input type="hidden" name="status" value="REJECTED" />
                                    <button type="submit" class="btn btn-outline-danger btn-sm rounded-pill">Reject</button>
                                </form>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
