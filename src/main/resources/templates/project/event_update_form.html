<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/main-layout :: page_layout(~{::title}, ~{::body})}">
<head>
    <meta charset="UTF-8">
    <title>Đăng cập nhật dự án</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div style="margin-left: 50px; padding: 20px;">
<h1>Đăng cập nhật cho dự án: <span th:text="${project.title}">Tên dự án</span></h1>
<form th:action="@{/projects/detail/{id}/update(id=${project.id})}" method="post">
    <div>
        <label>Tiêu đề:</label>
        <input type="text" name="title" required />
    </div>
    <div>
        <label>Nội dung:</label>
        <textarea name="content" required></textarea>
    </div>
    <div>
        <label>Link ảnh (tùy chọn):</label>
        <input type="text" name="imageUrl" />
    </div>
    <button type="submit">Đăng cập nhật</button>
</form>
</div>
</body>
</html>
