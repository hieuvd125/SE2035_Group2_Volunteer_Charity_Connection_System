<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/main-layout :: page_layout(~{::title}, ~{::body})}">
<head>
    <meta charset="UTF-8">
    <title>Admin - Duyệt dự án</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div style="margin-left: 50px; padding: 20px;">
<div class="container mt-4">
    <h2>Duyệt dự án chờ phê duyệt</h2>
    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <table class="table table-striped" th:if="${not #lists.isEmpty(pendingProjects)}">
        <thead>
        <tr>
            <th>ID</th>
            <th>Tiêu đề</th>
            <th>Địa điểm</th>
            <th>Organizer</th>
            <th>Hành động</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="project : ${pendingProjects}">
            <td th:text="${project.id}"></td>
            <td th:text="${project.title}"></td>
            <td th:text="${project.location}"></td>
            <td th:text="${project.organizer?.fullName}"></td>
            <td>
                <form th:action="@{'/projects/admin/approve/' + ${project.id}}" method="post" style="display:inline;" onsubmit="return confirm('Bạn có chắc chắn muốn duyệt dự án này?');">
                    <button type="submit" class="btn btn-success btn-sm">Phê duyệt</button>
                </form>
                <!-- Có thể thêm nút Từ chối nếu cần -->
            </td>
        </tr>
        </tbody>
    </table>
    <div th:if="${#lists.isEmpty(pendingProjects)}" class="alert alert-info">
        Không có dự án nào đang chờ duyệt.
    </div>
</div>
</div>
</body>
</html>
