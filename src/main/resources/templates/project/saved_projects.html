<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Saved Projects</title>
</head>
<body>
<div th:replace="~{fragments/header :: header-part}"></div>
<div th:replace="~{fragments/sidebar :: sidebar-part}"></div>

<div style="margin-left: 220px; padding: 20px;">
    <h1>My Saved Projects</h1>

    <div th:if="${savedProjects == null or savedProjects.isEmpty()}">
        <p>You haven't saved any projects yet.</p>
    </div>

    <table th:if="${savedProjects != null and !savedProjects.isEmpty()}">
        <thead>
        <tr>
            <th>Project Title</th>
            <th>Saved At</th>
            <th>Action</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="sp : ${savedProjects}">
            <td th:text="${sp.project.title}">Project title</td>
            <td th:text="${sp.savedAt}">Saved date</td>
            <td>
                <a th:href="@{/projects/detail/{id}(id=${sp.project.id})}">
                    <button style="background: blue; color: white;">View Details</button>
                </a>
                <form th:action="@{/projects/unsave}" method="post" style="display:inline;">
                    <input type="hidden" name="projectId" th:value="${sp.project.id}" />
                    <input type="hidden" name="userId" th:value="${currentUserId}" />
                    <button type="submit" style="background: red; color: white;">Remove</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
