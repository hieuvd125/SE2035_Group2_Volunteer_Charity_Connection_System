<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/main-layout :: page_layout(~{::title}, ~{::body})}">
<head>
    <meta charset="UTF-8">
    <title>Chi tiết dự án</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div style="margin-left: 50px; padding: 20px;">
<h1 th:text="${project.title}">Tên dự án</h1>
<p th:text="${project.description}">Mô tả</p>

<div th:if="${message}" th:text="${message}" style="color: green; font-weight: bold;"></div>
<div th:if="${error}" th:text="${error}" style="color: red;"></div>

<div th:if="${currentUserId != null}">
    <form th:if="${!isSaved}" th:action="@{/projects/save}" method="post">
        <input type="hidden" name="projectId" th:value="${project.id}" />
        <input type="hidden" name="userId" th:value="${currentUserId}" />
        <button type="submit">Lưu dự án</button>
    </form>
    <form th:if="${isSaved}" th:action="@{/projects/unsave}" method="post">
        <input type="hidden" name="projectId" th:value="${project.id}" />
        <input type="hidden" name="userId" th:value="${currentUserId}" />
        <button type="submit">Bỏ lưu</button>
    </form>
</div>

<h2>Nhật ký sự kiện</h2>
<a th:if="${session.loggedUser?.role == 'ROLE_ORGANIZER'}"
   th:href="@{/projects/detail/{id}/update(id=${project.id})}">
    Đăng cập nhật mới
</a>

<div th:if="${updates != null and !updates.isEmpty()}">
    <div th:each="update : ${updates}">
        <h3 th:text="${update.title}">Tiêu đề</h3>
        <p th:text="${update.content}">Nội dung</p>
        <small th:text="${update.createdAt}">Thời gian</small>
        <img th:if="${update.imageUrl}" th:src="${update.imageUrl}" alt="Ảnh" width="200"/>
        <hr>
    </div>
</div>
<div th:if="${updates == null or updates.isEmpty()}">
    <p>Chưa có cập nhật nào.</p>
</div>
</div>
</body>
</html>
