<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Volunteer Projects</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body>

<div th:replace="~{fragments/header :: header-part}"></div>
<div th:replace="~{fragments/sidebar :: sidebar-part}"></div>

<div style="margin-left:220px;padding:20px;">

    <div class="container">

        <h2 class="mb-4">
            Danh sách dự án tình nguyện
        </h2>

        <!-- ================= SEARCH ================= -->

        <form th:action="@{/projects}" method="get">

            <div class="row mb-4">

                <div class="col-md-5">

                    <input
                            type="text"
                            name="keyword"
                            class="form-control"
                            placeholder="Tìm theo tên dự án..."
                            th:value="${keyword}">

                </div>

                <div class="col-md-5">

                    <input
                            type="text"
                            name="location"
                            class="form-control"
                            placeholder="Tìm theo địa điểm..."
                            th:value="${location}">

                </div>

                <div class="col-md-1">

                    <button class="btn btn-primary w-100">

                        Search

                    </button>

                </div>

                <div class="col-md-1">

                    <a th:href="@{/projects}"
                       class="btn btn-secondary w-100">

                        Reset

                    </a>

                </div>

            </div>

        </form>

        <!-- ================= TABLE ================= -->

        <table class="table table-bordered table-hover">

            <thead class="table-dark">

            <tr>

                <th>ID</th>

                <th>Title</th>

                <th>Location</th>

                <th>Start Date</th>

                <th>End Date</th>

                <th>Needed</th>

                <th>Status</th>

                <th>Action</th>

            </tr>

            </thead>

            <tbody>

            <tr th:if="${projects==null || projects.isEmpty()}">

                <td colspan="8"
                    class="text-center">

                    Không có dự án phù hợp.

                </td>

            </tr>

            <tr th:each="project : ${projects}">

                <td th:text="${project.id}"></td>

                <td th:text="${project.title}"></td>

                <td th:text="${project.location}"></td>

                <td th:text="${#temporals.format(project.startDate,'dd/MM/yyyy HH:mm')}"></td>

                <td th:text="${#temporals.format(project.endDate,'dd/MM/yyyy HH:mm')}"></td>

                <td th:text="${project.targetVolunteers}"></td>

                <td>

                    <span class="badge bg-success"
                          th:text="${project.status}">
                    </span>

                </td>

                <td>

                    <a th:href="@{/projects/detail/{id}(id=${project.id})}"
                       class="btn btn-info btn-sm">

                        View Detail

                    </a>

                </td>

            </tr>

            </tbody>

        </table>

    </div>

</div>

</body>
</html>
