<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Danh sách dự án</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/header :: header-part}"></div>
<div th:replace="~{fragments/sidebar :: sidebar-part}"></div>
<div style="margin-left: 220px; padding: 20px;">
<div class="container mt-4">
    <h2>Dự án của tôi</h2>
    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <table class="table table-bordered">
        <thead>
        <tr>
            <th>ID</th>
            <th>Tiêu đề</th>
            <th>Trạng thái</th>
            <th>Ngày bắt đầu</th>
            <th>Hành động</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="project : ${projects}">
            <td th:text="${project.id}"></td>
            <td th:text="${project.title}"></td>
            <td th:text="${project.status}"></td>
            <td th:text="${#temporals.format(project.startDate, 'dd/MM/yyyy HH:mm')}"></td>
            <td><a th:href="@{/projects/detail/{id}(id=${project.id})}">
                <button style="background: blue; color: white; cursor: pointer;">Chi tiết</button></td>
        </tr>
        </tbody>
    </table>
    <a th:href="@{/projects/create}" class="btn btn-primary">Tạo dự án mới</a>
</div>
</div>
</body>
</html>
