<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Tạo dự án mới</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div th:replace="~{fragments/header :: header-part}"></div>
<div th:replace="~{fragments/sidebar :: sidebar-part}"></div>
<div style="margin-left: 220px; padding: 20px;">
    <div class="container mt-4">
        <h2>Tạo dự án tình nguyện</h2>
        <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>
        <form th:action="@{/projects/create}" th:object="${projectDTO}" method="post">
            <div class="mb-3">
                <label>Tiêu đề</label>
                <input type="text" class="form-control" th:field="*{title}" th:classappend="${#fields.hasErrors('title')} ? 'is-invalid' : ''" required/>
                <div class="invalid-feedback" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></div>
            </div>
            <div class="mb-3">
                <label>Mô tả</label>
                <textarea class="form-control" th:field="*{description}" rows="4"></textarea>
            </div>
            <div class="mb-3">
                <label>Ảnh bìa URL</label>
                <input type="text" class="form-control" th:field="*{imageUrl}" placeholder="https://..."/>
            </div>
            <div class="mb-3">
                <label>Địa điểm</label>
                <input type="text" class="form-control" th:field="*{location}" th:classappend="${#fields.hasErrors('location')} ? 'is-invalid' : ''" required/>
                <div class="invalid-feedback" th:if="${#fields.hasErrors('location')}" th:errors="*{location}"></div>
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label>Ngày bắt đầu</label>
                    <input type="datetime-local" class="form-control" th:field="*{startDate}" th:classappend="${#fields.hasErrors('startDate')} ? 'is-invalid' : ''" required/>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('startDate')}" th:errors="*{startDate}"></div>
                </div>
                <div class="col-md-6 mb-3">
                    <label>Ngày kết thúc</label>
                    <input type="datetime-local" class="form-control" th:field="*{endDate}" th:classappend="${#fields.hasErrors('endDate')} ? 'is-invalid' : ''" required/>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('endDate')}" th:errors="*{endDate}"></div>
                </div>
            </div>
            <div class="mb-3">
                <label>Số tình nguyện viên cần tuyển</label>
                <input type="number" class="form-control" th:field="*{targetVolunteers}" min="1" th:classappend="${#fields.hasErrors('targetVolunteers')} ? 'is-invalid' : ''" required/>
                <div class="invalid-feedback" th:if="${#fields.hasErrors('targetVolunteers')}" th:errors="*{targetVolunteers}"></div>
            </div>
            <!-- Sau này có thể thêm dropdown chọn category -->
            <button type="submit" class="btn btn-primary">Tạo dự án</button>
            <a th:href="@{/projects/organizer}" class="btn btn-secondary">Hủy</a>
        </form>
    </div>
</div>
</body>
</html>
