<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register Volunteer - VCPCS</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div th:replace="~{fragments/header :: header-part}"></div>
<div th:replace="~{fragments/sidebar :: sidebar-part}"></div>
<div style="margin-left: 220px; padding: 20px;">
    <div>
        <h2>VCPCS VOLUNTEER REGISTRATION</h2>

        <div th:if="${errorMessage}" th:text="${errorMessage}" class="alert alert-danger" style="max-width: 400px;"></div>

        <form th:action="@{/register/volunteer}" th:object="${registerDTO}" method="POST" style="max-width: 400px;">

            <div style="margin-bottom: 15px;">
                <label style="display: block; font-weight: bold;">Username</label>
                <input type="text" th:field="*{username}" style="width: 100%; padding: 5px;">
                <p th:if="${#fields.hasErrors('username')}" th:errors="*{username}" style="color: red; margin: 5px 0 0 0; font-size: 14px;"></p>
            </div>

            <div style="margin-bottom: 15px;">
                <label style="display: block; font-weight: bold;">Password</label>
                <input type="password" th:field="*{password}" style="width: 100%; padding: 5px;">
                <p th:if="${#fields.hasErrors('password')}" th:errors="*{password}" style="color: red; margin: 5px 0 0 0; font-size: 14px;"></p>
            </div>

            <div style="margin-bottom: 15px;">
                <label style="display: block; font-weight: bold;">Full Name</label>
                <input type="text" th:field="*{fullName}" style="width: 100%; padding: 5px;">
                <p th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}" style="color: red; margin: 5px 0 0 0; font-size: 14px;"></p>
            </div>

            <div style="margin-bottom: 15px;">
                <label style="display: block; font-weight: bold;">Email</label>
                <input type="text" th:field="*{email}" style="width: 100%; padding: 5px;">
                <p th:if="${#fields.hasErrors('email')}" th:errors="*{email}" style="color: red; margin: 5px 0 0 0; font-size: 14px;"></p>
            </div>

            <div style="margin-top: 20px;">
                <button type="submit">Register</button>
            </div>

            <div style="margin-top: 15px;">
                <span>Already have an account? </span>
                <a th:href="@{/login}">Back to Login</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
