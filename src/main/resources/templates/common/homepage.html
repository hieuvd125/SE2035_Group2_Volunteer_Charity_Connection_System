<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Homepage</title>
</head>
<body>

<div th:replace="~{fragments/header :: header-part}"></div>

<div th:replace="~{fragments/sidebar :: sidebar-part}"></div>

<div style="margin-left: 220px; padding: 20px;">
    <h1>Homepage Content</h1>

    <div>
        <h3>Volunteer campaigns:</h3>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Title</th>
                    <th>Location</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="proj : ${projects}">
                    <td th:text="${proj.id}">1</td>
                    <td th:text="${proj.title}">Tên dự án mẫu</td>
                    <td th:text="${proj.location}">Vị trí dự án</td>
                    <td>
                        <a th:href="@{/projects/{id}/donate(id=${proj.id})}">
                            <button style="background: green; color: white; cursor: pointer;">Donate</button>
                        </a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
