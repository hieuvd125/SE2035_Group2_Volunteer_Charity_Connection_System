<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Danh sách quyên góp</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div th:replace="~{fragments/header :: header-part}"></div>
<div th:replace="~{fragments/sidebar :: sidebar-part}"></div>
<div style="margin-left: 220px; padding: 20px;">
    <h1>Danh sách quyên góp</h1>

    <p>Mã dự án: <span th:text="${projectId}"></span></p>
    <p>Tổng số tiền đã quyên góp: <span th:text="${#numbers.formatDecimal(totalDonation, 0, 'COMMA', 0, 'POINT')}"></span> VND</p>

    <table border="1">
        <thead>
        <tr>
            <th>ID</th>
            <th>Tên người quyên góp</th>
            <th>Số tiền</th>
            <th>Thời gian quyên góp</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="donation : ${donations}">
            <td th:text="${donation.id}"></td>
            <td th:text="${donation.donorName}"></td>
            <td><span th:text="${#numbers.formatDecimal(donation.amount, 0, 'COMMA', 0, 'POINT')}"></span> VND</td>
            <td th:text="${donation.donatedAt}"></td>
        </tr>
        </tbody>
    </table>

<p>
    <a th:href="@{/projects/detail/{id}(id=${projectId})}">Quay lại chi tiết dự án</a>
</p>
</div>
</body>
</html>
