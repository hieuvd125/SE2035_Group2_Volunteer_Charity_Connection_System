<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/main-layout :: page_layout(~{::title}, ~{::body})}">
<head>
    <meta charset="UTF-8">
    <title>Donation List</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div th:replace="~{fragments/header :: header-part}"></div>
<div th:replace="~{fragments/sidebar :: sidebar-part}"></div>
<div style="margin-left: 220px; padding: 20px;">
    <h1>Donation List</h1>

    <p>Project ID: <span th:text="${projectId}"></span></p>
    <p>Total donated amount: <span th:text="${totalDonation}"></span></p>

    <table border="1">
        <thead>
        <tr>
            <th>ID</th>
            <th>Donor name</th>
            <th>Amount</th>
            <th>Donation time</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="donation : ${donations}">
            <td th:text="${donation.id}"></td>
            <td th:text="${donation.donorName}"></td>
            <td th:text="${donation.amount}"></td>
            <td th:text="${donation.donatedAt}"></td>
        </tr>
        </tbody>
    </table>

<p>
    <a th:href="@{/projects/{projectId}/donate(projectId=${projectId})}">Back to donation form</a>
</p>
</div>
</body>
</html>
