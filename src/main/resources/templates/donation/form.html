<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quyên góp</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div th:replace="~{fragments/header :: header-part}"></div>
<div th:replace="~{fragments/sidebar :: sidebar-part}"></div>
<div style="margin-left: 220px; padding: 20px;">
    <h1>Quyên góp cho dự án</h1>

    <p>Mã dự án: <span th:text="${projectId}"></span></p>
    <p>Tổng số tiền đã quyên góp: <span th:text="${#numbers.formatDecimal(totalDonation, 0, 'COMMA', 0, 'POINT')}"></span> VND</p>

    <p th:if="${param.success}" style="color: green;">Cảm ơn bạn đã quyên góp!</p>

<form th:action="@{/projects/{projectId}/donate(projectId=${projectId})}" th:object="${donationDTO}" method="post">
    <div>
        <label for="donorName">Tên người quyên góp</label>
        <input id="donorName" th:field="*{donorName}" type="text" maxlength="100" required>
        <span th:if="${#fields.hasErrors('donorName')}" th:errors="*{donorName}" style="color: red;"></span>
    </div>

    <div>
        <label for="amount">Số tiền</label>
        <input id="amount" th:field="*{amount}" type="number" min="1000" step="1000" required>
        <span th:if="${#fields.hasErrors('amount')}" th:errors="*{amount}" style="color: red;"></span>
    </div>

        <button type="submit">Quyên góp</button>
    </form>

<p>
    <a th:href="@{/projects/detail/{id}(id=${projectId})}">Quay lại chi tiết dự án</a>
</p>
</div>
</body>
</html>
