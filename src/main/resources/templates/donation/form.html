<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/main-layout :: page_layout(~{::title}, ~{::body})}">
<head>
    <meta charset="UTF-8">
    <title>Simulated Donation</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div style="margin-left: 50px; padding: 20px;">
<h1>Simulated Donation</h1>

<p>Project ID: <span th:text="${projectId}"></span></p>
<p>Total donated amount: <span th:text="${totalDonation}"></span></p>

<p th:if="${param.success}" style="color: green;">Thank you for your donation!</p>

<form th:action="@{/projects/{projectId}/donate(projectId=${projectId})}" th:object="${donationDTO}" method="post">
    <div>
        <label for="donorName">Donor name</label>
        <input id="donorName" th:field="*{donorName}" type="text" maxlength="100" required>
        <span th:if="${#fields.hasErrors('donorName')}" th:errors="*{donorName}" style="color: red;"></span>
    </div>

    <div>
        <label for="amount">Amount</label>
        <input id="amount" th:field="*{amount}" type="number" min="1000" step="1000" required>
        <span th:if="${#fields.hasErrors('amount')}" th:errors="*{amount}" style="color: red;"></span>
    </div>

    <button type="submit">Donate</button>
</form>

<p>
    <a th:href="@{/projects/{projectId}/donations(projectId=${projectId})}">View donation list</a>
</p>
</div>
</body>
</html>
